version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: farmarh_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-farmarh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-farmarh_secret_2026}
      POSTGRES_DB: ${DB_NAME:-farmarh_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-farmarh}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmarh_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-farmarh}:${DB_PASSWORD:-farmarh_secret_2026}@db:5432/${DB_NAME:-farmarh_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-farmarh_jwt_secret_cambiar_en_produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-development}
    container_name: farmarh_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  pgdata:
